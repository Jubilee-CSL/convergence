<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convergence — Speakers</title>
  <meta name="description" content="Invited speakers and panelists at Convergence." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<script src="assets/js/nav.js"></script>

  <!-- Hero -->
  <header class="page-hero compact">
    <p class="workshop-label">Convergence Workshop</p>
    <h1>Speakers</h1>
  </header>

  <!-- Main content -->
  <main class="main-content">

    <section class="section-block" id="speakers">
      <!--
        HOW TO ADD A SPEAKER
        ────────────────────
        Copy a <div class="card"> block and fill in:
          src       → headshot path, e.g. assets/img/speaker-jane.jpg
          card-name → full name
          card-role → title, affiliation
          card-bio  → short bio (1–3 sentences)
      -->
      <div class="card-grid">
        <div class="card">
          <img class="card-avatar" src="assets/img/nadya-headshot.jpg" alt="Nadya Peek" />
          <p class="card-name">Nadya Peek</p>
          <p class="card-role">Associate Professor, University of Washington</p>
          <p class="card-bio">Project: <a href="https://science-jubilee.readthedocs.io/en/latest/" target="_blank" rel="noopener noreferrer">Science-Jubilee</a>.</p>
        </div>
        <div class="card">
          <img class="card-avatar" src="assets/img/jerome.png" alt="Jérôme Mutterer" />
          <p class="card-name">Jérôme Mutterer </p>
          <p class="card-role">Research Engineer, Université de Strasbourg</p>
          <p class="card-bio">Project: <a href="https://www.eurobioimaging.eu/news/innovative-applications-of-the-enderscope-a-low-cost-microscopy-system/" target="_blank" rel="noopener noreferrer">Enderscope</a>.</p>
        </div>
        <div class="card">
          <img class="card-avatar" src="assets/img/placeholder-avatar.svg" alt="Speaker" />
          <p class="card-name">Speaker Name</p>
          <p class="card-role">Title, OpenUC2</p>
          <p class="card-bio">Project: <a href="https://openuc2.com/" target="_blank" rel="noopener noreferrer">OpenUC2</a>.</p>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Convergence Workshop &mdash; <a href="https://github.com/Jubilee-CSL/convergence">GitHub</a></p>
  </footer>

</body>
</html>
