<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convergence — Registration</title>
  <meta name="description" content="Register for the Convergence workshop seminars." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <script src="assets/js/nav.js"></script>

  <header class="page-hero compact">
    <p class="workshop-label">Convergence Workshop</p>
    <h1>Registration</h1>
  </header>

  <main class="main-content">

    <section class="section-block" id="form">
      <!--
        Paste your Formbricks link survey URL as the iframe src:
        src="https://app.formbricks.com/s/YOUR_SURVEY_ID"
      -->
      <div class="placeholder" style="min-height:480px; flex-direction:column; gap:0.75rem;">
        <strong style="font-size:1rem; color:var(--color-muted);">Registration form coming soon</strong>
      </div>

      <!-- Replace the placeholder above with:
      <iframe
        src="https://app.formbricks.com/s/YOUR_SURVEY_ID"
        width="100%"
        height="600"
        frameborder="0"
        style="border-radius:8px; border:1px solid var(--color-border); display:block;">
      </iframe>
      -->
    </section>

  </main>

  <footer class="site-footer">
    <p>Convergence Workshop &mdash; <a href="https://github.com/Jubilee-CSL/convergence">GitHub</a></p>
  </footer>

</body>
</html>
