<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convergence — Contact</title>
  <meta name="description" content="Get in touch with the Convergence organising team." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    #formbricks-embed {
      min-height: 580px;
    }
  </style>
</head>
<body>
  <script src="assets/js/nav.js"></script>

  <header class="page-hero compact">
    <p class="workshop-label">Convergence Workshop</p>
    <h1>Contact</h1>
  </header>

  <main class="main-content">

    <section class="section-block">
      <h2>Send a message</h2>
      <p style="font-size:0.88rem; color:var(--color-muted); margin-bottom:1.5rem;">
        Your message will be forwarded to the organising team.
        Your email address is never displayed publicly.
        Form powered by <a href="https://formbricks.com" target="_blank" rel="noopener">Formbricks</a> (open-source, MIT licence).
      </p>

      <!--
        Replace YOUR_SURVEY_ID with the ID from your Formbricks link survey URL:
        https://app.formbricks.com/s/YOUR_SURVEY_ID
      -->
      <iframe
        id="formbricks-embed"
        src="https://app.formbricks.com/s/cmpcnhpbkxfaowo01erv71dny"
        width="100%"
        height="580"
        frameborder="0"
        style="border-radius:8px; border:1px solid var(--color-border); display:block;">
      </iframe>
    </section>

  </main>

  <footer class="site-footer">
    <p>Convergence Workshop &mdash; <a href="https://github.com/Jubilee-CSL/convergence">GitHub</a></p>
  </footer>

</body>
</html>
